project:
  id: "babajiai-training"
  number: "225257452450"
  region: "us-central1"
  service_account: "vertex-mlops-sa@babajiai-training.iam.gserviceaccount.com"

storage:
  # GCS bucket for pipeline artifacts, compiled YAMLs, model artifacts
#newchange
  pipeline_root: "gs://babajiai-training-mlops-artifacts/pipeline_root"
  compiled_pipelines: "gs://babajiai-training-mlops-artifacts/compiled_pipelines"
  model_artifacts: "gs://babajiai-training-mlops-artifacts/models"

bigquery:
  dataset: "used_car_mlops"
  train_table: "car_prices_train"
  test_table: "car_prices_test"
  inference_table: "car_prices_inference"       # New rows here trigger inference pipeline
  predictions_table: "car_predictions"          # Inference results land here
  inference_processed_table: "car_prices_inference_processed"  # Processed rows (avoid re-processing)
  location: "US"

vertex_ai:
  experiment_name: "used-car-price-prediction"
  experiment_description: "XGBoost model tracking for used car price regression"
  model_name: "used-car-price-xgb"
  dataset_name: "used-car-prices-dataset"
  pipeline_name_training: "used-car-training-pipeline"
  pipeline_name_inference: "used-car-inference-pipeline"
  staging_endpoint_name: "used-car-staging-endpoint"
  production_endpoint_name: "used-car-production-endpoint"
  # Prebuilt sklearn serving container (matches sklearn 1.3 + XGBoost)
  serving_container_image: "us-docker.pkg.dev/vertex-ai/prediction/sklearn-cpu.1-3:latest"

training:
  machine_type: "n1-standard-8"
  # XGBoost hyperparameters
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 3
  # Evaluation gate — pipeline won't deploy if RMSE exceeds this
  rmse_threshold: 4500.0
  r2_threshold: 0.80

serving:
  machine_type: "n1-standard-2"   # 2 CPUs; quota is 8 CPUs total (staging=2 + prod=2 = 4)
  min_replicas_staging: 1
  max_replicas_staging: 1
  min_replicas_production: 1
  max_replicas_production: 2

batch_prediction:
  # Used when inference table has >= batch_threshold new rows
  batch_threshold: 100
  machine_type: "n1-standard-4"
  starting_replica_count: 2
  max_replica_count: 10

trigger:
  # Cloud Scheduler cron for polling the inference BigQuery table
  schedule: "*/15 * * * *"   # every 15 minutes
  time_zone: "America/New_York"