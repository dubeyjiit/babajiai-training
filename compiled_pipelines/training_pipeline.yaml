        - model_registry_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'google-cloud-aiplatform==1.60.0'\
          \ 'google-cloud-storage==2.17.0' 'scikit-learn==1.4.2' 'xgboost==2.0.3'\
          \ 'joblib==1.4.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef model_registry_op(\n    project_id: str,\n    region: str,\n\
          \    staging_bucket: str,\n    model_name: str,\n    serving_container_image:\
          \ str,\n    experiment_name: str,\n    experiment_run_name: str,\n    pipeline_run_id:\
          \ str,\n    test_rmse: float,\n    test_r2: float,\n    trained_model: Input[Model],\n\
          \    registered_model_info: Output[Artifact],\n) -> NamedTuple(\"RegistryOutputs\"\
          , [(\"model_resource_name\", str), (\"model_version_id\", str)]):\n    \"\
          \"\"Upload model artifact to GCS, register in Vertex AI Model Registry with\
          \ metadata.\"\"\"\n    import json\n    import uuid\n    import google.cloud.aiplatform\
          \ as aip\n    from google.cloud import storage\n    from collections import\
          \ namedtuple\n\n    aip.init(project=project_id, location=region, staging_bucket=staging_bucket,\n\
          \             experiment=experiment_name)\n\n    # \u2500\u2500 Copy model\
          \ artifact to GCS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \n    # Vertex AI expects model.pkl at gs://<bucket>/model/model.pkl\n \
          \   bucket_name = staging_bucket.replace(\"gs://\", \"\").split(\"/\")[0]\n\
          \    gcs_model_dir = f\"models/{experiment_run_name}\"\n    gcs_client =\
          \ storage.Client(project=project_id)\n    bucket = gcs_client.bucket(bucket_name)\n\
          \n    local_model_path = trained_model.path + \".pkl\"\n    gcs_model_blob\
          \ = f\"{gcs_model_dir}/model.pkl\"\n    bucket.blob(gcs_model_blob).upload_from_filename(local_model_path)\n\
          \    gcs_model_uri = f\"gs://{bucket_name}/{gcs_model_dir}\"\n    print(f\"\
          Model artifact uploaded \u2192 {gcs_model_uri}\")\n\n    # \u2500\u2500\
          \ Register model / create new version \u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\n    # Check if a model with this name already\
          \ exists\n    existing_models = aip.Model.list(\n        filter=f'displayName=\"\
          {model_name}\"',\n        project=project_id,\n        location=region,\n\
          \    )\n\n    labels = {\n        \"experiment\":    experiment_name[:63].replace(\"\
          \ \", \"-\").lower(),\n        \"pipeline_run\":  pipeline_run_id[:63].replace(\"\
          \ \", \"-\").lower()[:63],\n        \"framework\":     \"xgboost\",\n  \
          \      \"task\":          \"regression\",\n    }\n\n    model_description\
          \ = (\n        f\"Used car price prediction \u2014 XGBoost. \"\n       \
          \ f\"Run: {experiment_run_name} | RMSE: {test_rmse:.0f} | R\xB2: {test_r2:.4f}\"\
          \n    )\n\n    # Pre-built sklearn containers already define /predict +\
          \ /ping routes internally.\n    # Specifying serving_container_health_route\
          \ here overrides to a wrong path and\n    # causes health checks to fail\
          \ during endpoint.deploy(). Leave routes unset.\n    if existing_models:\n\
          \        # Upload as a new version of the existing model\n        parent_model\
          \ = existing_models[0].resource_name\n        print(f\"Registering new version\
          \ under existing model: {parent_model}\")\n        model = aip.Model.upload(\n\
          \            display_name=model_name,\n            artifact_uri=gcs_model_uri,\n\
          \            serving_container_image_uri=serving_container_image,\n    \
          \        description=model_description,\n            labels=labels,\n  \
          \          parent_model=parent_model,          # \u2190 creates a new version\n\
          \            is_default_version=True,\n        )\n    else:\n        print(f\"\
          No existing model found. Registering as new model: {model_name}\")\n   \
          \     model = aip.Model.upload(\n            display_name=model_name,\n\
          \            artifact_uri=gcs_model_uri,\n            serving_container_image_uri=serving_container_image,\n\
          \            description=model_description,\n            labels=labels,\n\
          \        )\n\n    model_resource_name = model.resource_name\n    # Version\
          \ ID is the last segment of the version resource name\n    # resource_name\
          \ format: projects/.../models/<model_id>\n    model_id = model_resource_name.split(\"\
          /models/\")[-1]\n    # Fetch version details\n    version_id = getattr(model,\
          \ \"version_id\", \"1\")\n\n    print(f\"Model registered: {model_resource_name}\"\
          )\n    print(f\"Version ID:       {version_id}\")\n\n    # \u2500\u2500\
          \ Write ML Metadata (visible in Agent Platform \u2192 Metadata) \u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \n    info = {\n        \"model_resource_name\":  model_resource_name,\n\
          \        \"model_id\":             model_id,\n        \"version_id\":  \
          \         version_id,\n        \"gcs_artifact_uri\":     gcs_model_uri,\n\
          \        \"display_name\":         model_name,\n        \"experiment_run_name\"\
          :  experiment_run_name,\n        \"test_rmse\":            test_rmse,\n\
          \        \"test_r2\":              test_r2,\n        \"serving_container\"\
          :    serving_container_image,\n    }\n    with open(registered_model_info.path\
          \ + \".json\", \"w\") as f:\n        json.dump(info, f, indent=2)\n\n  \
          \  # Log lineage via Vertex AI Experiment\n    unique_run_name = f\"{experiment_run_name}-reg-{uuid.uuid4().hex[:6]}\"\
          \n    print(f\"Experiment run name: {unique_run_name}\")\n    with aip.start_run(unique_run_name):\n\
          \        aip.log_params({\n            \"model_resource_name\": model_resource_name,\n\
          \            \"model_version_id\":    version_id,\n            \"gcs_artifact_uri\"\
          :    gcs_model_uri,\n        })\n\n    print(\"=== Model Registry complete\
          \ ===\")\n    RegistryOutputs = namedtuple(\"RegistryOutputs\", [\"model_resource_name\"\
          , \"model_version_id\"])\n    return RegistryOutputs(model_resource_name=model_resource_name,\
          \ model_version_id=str(version_id))\n\n"
        image: python:3.10-slim
