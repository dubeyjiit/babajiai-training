deploymentSpec:
  executors:
    exec-data-ingestion-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - data_ingestion_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'google-cloud-bigquery[pandas]==3.25.0'\
          \ 'google-cloud-aiplatform==1.60.0' 'google-cloud-storage==2.17.0' 'pandas==2.2.2'\
          \ 'db-dtypes==1.3.0' 'pyarrow==15.0.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef data_ingestion_op(\n    project_id: str,\n    region: str,\n\
          \    bq_dataset: str,\n    bq_train_table: str,\n    bq_test_table: str,\n\
          \    vertex_dataset_name: str,\n    staging_bucket: str,\n    train_data:\
          \ Output[Dataset],\n    test_data: Output[Dataset],\n    vertex_dataset_resource_name:\
          \ Output[Artifact],\n) -> None:\n    import json\n    import pandas as pd\n\
          \    from google.cloud import bigquery, storage\n    import google.cloud.aiplatform\
          \ as aip\n\n    aip.init(project=project_id, location=region, staging_bucket=staging_bucket)\n\
          \    bq_client  = bigquery.Client(project=project_id)\n    gcs_client =\
          \ storage.Client(project=project_id)\n\n    def _bq_to_df(table: str) ->\
          \ pd.DataFrame:\n        query = f\"SELECT * FROM `{project_id}.{bq_dataset}.{table}`\"\
          \n        print(f\"  Running: {query}\")\n        df = bq_client.query(query).to_dataframe()\n\
          \        print(f\"  \u2192 {len(df):,} rows, columns: {df.columns.tolist()}\"\
          )\n        return df\n\n    train_df = _bq_to_df(bq_train_table)\n    test_df\
          \ = _bq_to_df(bq_test_table)\n\n    train_df.to_csv(train_data.path + \"\
          .csv\", index=False)\n    test_df.to_csv(test_data.path   + \".csv\", index=False)\n\
          \    print(f\"Train artifact written: {train_data.path}.csv\")\n    print(f\"\
          Test  artifact written: {test_data.path}.csv\")\n\n    bucket_name  = staging_bucket.replace(\"\
          gs://\", \"\").split(\"/\")[0]\n    gcs_train_uri = f\"{staging_bucket}/data/train/{bq_train_table}.csv\"\
          \n    gcs_test_uri  = f\"{staging_bucket}/data/test/{bq_test_table}.csv\"\
          \n\n    def _gcs_blob_path(gcs_uri: str) -> str:\n        return \"/\".join(gcs_uri.replace(\"\
          gs://\", \"\").split(\"/\")[1:])\n\n    bucket = gcs_client.bucket(bucket_name)\n\
          \    bucket.blob(_gcs_blob_path(gcs_train_uri)).upload_from_string(\n  \
          \      train_df.to_csv(index=False), content_type=\"text/csv\"\n    )\n\
          \    bucket.blob(_gcs_blob_path(gcs_test_uri)).upload_from_string(\n   \
          \     test_df.to_csv(index=False), content_type=\"text/csv\"\n    )\n  \
          \  print(f\"Uploaded train CSV \u2192 {gcs_train_uri}\")\n    print(f\"\
          Uploaded test  CSV \u2192 {gcs_test_uri}\")\n\n    # Register Vertex AI\
          \ Tabular Dataset\n    # Visible in Agent Platform \u2192 Datasets\n   \
          \ dataset_resource_name = \"\"\n    try:\n        existing = aip.TabularDataset.list(\n\
          \            filter=f'display_name=\"{vertex_dataset_name}\"',\n       \
          \     project=project_id,\n            location=region,\n        )\n   \
          \     if existing:\n            dataset_resource_name = existing[0].resource_name\n\
          \            print(f\"  Reusing existing dataset: {dataset_resource_name}\"\
          )\n        else:\n            ds = aip.TabularDataset.create(\n        \
          \        display_name=vertex_dataset_name,\n                gcs_source=gcs_train_uri,\n\
          \            )\n            dataset_resource_name = ds.resource_name\n \
          \           print(f\"  Created dataset: {dataset_resource_name}\")\n   \
          \ except Exception as e:\n        print(f\"  WARNING: Could not register\
          \ Vertex AI Dataset (non-fatal): {e}\")\n        dataset_resource_name =\
          \ \"registration-failed\"\n\n    with open(vertex_dataset_resource_name.path,\
          \ \"w\") as f:\n        json.dump({\n            \"resource_name\": dataset_resource_name,\n\
          \            \"gcs_train_uri\": gcs_train_uri,\n            \"gcs_test_uri\"\
          :  gcs_test_uri,\n        }, f)\n\n    print(\"=== Data ingestion complete\
          \ ===\")\n\n"
        image: python:3.10-slim
        resources:
          cpuLimit: 2.0
          memoryLimit: 8.0
    exec-data-preprocessing-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - data_preprocessing_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'scikit-learn==1.4.2'\
          \ 'pandas==2.2.2' 'numpy==1.26.4' 'joblib==1.4.2' 'google-cloud-aiplatform==1.60.0'\
          \ 'google-cloud-storage==2.17.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef data_preprocessing_op(\n    project_id: str,\n    region: str,\n\
          \    experiment_name: str,\n    experiment_run_name: str,\n    staging_bucket:\
          \ str,\n    train_data: Input[Dataset],\n    test_data: Input[Dataset],\n\
          \    preprocessed_train: Output[Dataset],\n    preprocessed_test: Output[Dataset],\n\
          \    preprocessor_artifact: Output[Model],\n    preprocessing_metrics: Output[Metrics],\n\
          ) -> None:\n    \"\"\"Fit a ColumnTransformer on train, transform train+test,\
          \ log statistics.\"\"\"\n    import joblib\n    import pandas as pd\n  \
          \  from sklearn.compose import ColumnTransformer\n    from sklearn.pipeline\
          \ import Pipeline\n    from sklearn.preprocessing import StandardScaler,\
          \ OrdinalEncoder\n    from sklearn.impute import SimpleImputer\n    import\
          \ google.cloud.aiplatform as aip\n\n    aip.init(\n        project=project_id,\n\
          \        location=region,\n        staging_bucket=staging_bucket,\n    \
          \    experiment=experiment_name,\n    )\n\n    NUMERIC_FEATURES = [\"year\"\
          , \"mileage\", \"engine_size\", \"horsepower\",\n                      \
          \  \"accident_count\", \"num_owners\"]\n    CATEGORICAL_FEATURES = [\"fuel_type\"\
          , \"transmission\", \"brand\", \"condition\"]\n    TARGET = \"price\"\n\n\
          \    print(\"=== Loading datasets ===\")\n    train_df = pd.read_csv(train_data.path\
          \ + \".csv\")\n    test_df  = pd.read_csv(test_data.path  + \".csv\")\n\
          \    print(f\"Train shape: {train_df.shape}, Test shape: {test_df.shape}\"\
          )\n\n    # \u2500\u2500 Feature engineering \u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n   \
          \ for df in [train_df, test_df]:\n        df[\"car_age\"] = 2024 - df[\"\
          year\"]\n        df[\"mileage_per_year\"] = df[\"mileage\"] / (df[\"car_age\"\
          ].replace(0, 1))\n        df[\"hp_per_liter\"] = df[\"horsepower\"] / df[\"\
          engine_size\"]\n\n    NUMERIC_FEATURES = NUMERIC_FEATURES + [\"car_age\"\
          , \"mileage_per_year\", \"hp_per_liter\"]\n\n    # \u2500\u2500 Build preprocessor\
          \ \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\n    numeric_pipeline = Pipeline([\n    \
          \    (\"imputer\", SimpleImputer(strategy=\"median\")),\n        (\"scaler\"\
          ,  StandardScaler()),\n    ])\n    categorical_pipeline = Pipeline([\n \
          \       (\"imputer\", SimpleImputer(strategy=\"most_frequent\")),\n    \
          \    (\"encoder\", OrdinalEncoder(handle_unknown=\"use_encoded_value\",\
          \ unknown_value=-1)),\n    ])\n    preprocessor = ColumnTransformer(transformers=[\n\
          \        (\"num\", numeric_pipeline,       NUMERIC_FEATURES),\n        (\"\
          cat\", categorical_pipeline,   CATEGORICAL_FEATURES),\n    ], remainder=\"\
          drop\")\n\n    # \u2500\u2500 Fit on train, transform both \u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\n    X_train = train_df[NUMERIC_FEATURES + CATEGORICAL_FEATURES]\n\
          \    y_train = train_df[TARGET]\n    X_test  = test_df[NUMERIC_FEATURES\
          \ + CATEGORICAL_FEATURES]\n    y_test  = test_df[TARGET]\n\n    X_train_t\
          \ = preprocessor.fit_transform(X_train)\n    X_test_t  = preprocessor.transform(X_test)\n\
          \n    feature_names = (\n        NUMERIC_FEATURES\n        + CATEGORICAL_FEATURES\n\
          \    )\n\n    train_out = pd.DataFrame(X_train_t, columns=feature_names)\n\
          \    train_out[TARGET] = y_train.values\n    test_out  = pd.DataFrame(X_test_t,\
          \  columns=feature_names)\n    test_out[TARGET]  = y_test.values\n\n   \
          \ train_out.to_csv(preprocessed_train.path + \".csv\", index=False)\n  \
          \  test_out.to_csv(preprocessed_test.path   + \".csv\", index=False)\n\n\
          \    # \u2500\u2500 Save fitted preprocessor \u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\n    preprocessor_path = preprocessor_artifact.path\
          \ + \".pkl\"\n    meta = {\n        \"numeric_features\":     NUMERIC_FEATURES,\n\
          \        \"categorical_features\": CATEGORICAL_FEATURES,\n        \"target\"\
          :               TARGET,\n        \"feature_names\":        feature_names,\n\
          \    }\n    joblib.dump({\"preprocessor\": preprocessor, \"meta\": meta},\
          \ preprocessor_path)\n    print(f\"Preprocessor saved \u2192 {preprocessor_path}\"\
          )\n\n    # \u2500\u2500 Also copy preprocessor to a FIXED well-known GCS\
          \ path \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\n    # The KFP artifact path contains\
          \ a run-specific hash; this fixed path lets\n    # the inference pipeline\
          \ and Cloud Function always find the latest preprocessor.\n    fixed_gcs_path\
          \ = f\"{staging_bucket}/models/latest/preprocessor.pkl\"\n    try:\n   \
          \     from google.cloud import storage as gcs\n        bucket_name = staging_bucket.replace(\"\
          gs://\", \"\").split(\"/\")[0]\n        blob_path   = \"/\".join(fixed_gcs_path.replace(\"\
          gs://\", \"\").split(\"/\")[1:])\n        gcs_client  = gcs.Client(project=project_id)\n\
          \        gcs_client.bucket(bucket_name).blob(blob_path).upload_from_filename(preprocessor_path)\n\
          \        print(f\"Preprocessor also uploaded \u2192 {fixed_gcs_path}\")\n\
          \    except Exception as e:\n        print(f\"WARNING: Could not upload\
          \ preprocessor to fixed path (non-fatal): {e}\")\n\n    # \u2500\u2500 Log\
          \ metrics to Vertex AI Experiments \u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\n    stats = {\n        \"train_rows\":       int(len(train_df)),\n\
          \        \"test_rows\":        int(len(test_df)),\n        \"num_features\"\
          :     len(NUMERIC_FEATURES),\n        \"cat_features\":     len(CATEGORICAL_FEATURES),\n\
          \        \"target_mean_train\": float(y_train.mean()),\n        \"target_std_train\"\
          :  float(y_train.std()),\n        \"target_min_train\":  float(y_train.min()),\n\
          \        \"target_max_train\":  float(y_train.max()),\n        \"missing_pct_train\"\
          : float(train_df.isnull().sum().sum() / train_df.size * 100),\n    }\n \
          \   # Log to KFP metrics artifact\n    for k, v in stats.items():\n    \
          \    preprocessing_metrics.log_metric(k, v)\n\n    print(\"Preprocessing\
          \ statistics:\")\n    for k, v in stats.items():\n        print(f\"  {k}:\
          \ {v}\")\n\n    print(\"=== Preprocessing complete ===\")\n\n"
