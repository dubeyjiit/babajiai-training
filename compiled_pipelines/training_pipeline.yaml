    exec-model-evaluation-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - model_evaluation_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'scikit-learn==1.4.2'\
          \ 'xgboost==2.0.3' 'pandas==2.2.2' 'numpy==1.26.4' 'joblib==1.4.2' 'google-cloud-aiplatform==1.60.0'\
          \ 'matplotlib==3.9.0' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef model_evaluation_op(\n    project_id: str,\n    region: str,\n\
          \    staging_bucket: str,\n    experiment_name: str,\n    experiment_run_name:\
          \ str,\n    rmse_threshold: float,\n    r2_threshold: float,\n    trained_model:\
          \ Input[Model],\n    preprocessed_test: Input[Dataset],\n    feature_importance_artifact:\
          \ Input[Model],\n    evaluation_metrics: Output[Metrics],\n) -> NamedTuple(\"\
          EvalOutputs\", [(\"deploy_decision\", str), (\"test_rmse\", float), (\"\
          test_r2\", float)]):\n    \"\"\"Evaluate model on test set, gate deployment,\
          \ log to Vertex AI Metadata.\"\"\"\n    import uuid\n    import joblib\n\
          \    import numpy as np\n    import pandas as pd\n    from sklearn.metrics\
          \ import (\n        mean_squared_error, mean_absolute_error, r2_score,\n\
          \        mean_absolute_percentage_error,\n    )\n    import google.cloud.aiplatform\
          \ as aip\n    from collections import namedtuple\n\n    aip.init(\n    \
          \    project=project_id,\n        location=region,\n        staging_bucket=staging_bucket,\n\
          \        experiment=experiment_name,\n    )\n\n    TARGET = \"price\"\n\n\
          \    print(\"=== Loading model and test data ===\")\n    pipeline = joblib.load(trained_model.path\
          \ + \".pkl\")\n    test_df  = pd.read_csv(preprocessed_test.path + \".csv\"\
          )\n\n    X_test = test_df.drop(columns=[TARGET])\n    y_test = test_df[TARGET]\n\
          \n    print(f\"Evaluating on {len(X_test):,} test rows\")\n\n    # \u2500\
          \u2500 Predictions \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\n    # The pipeline includes preprocessor, so we need\
          \ raw features\n    # But preprocessed_test already has transformed features\
          \ \u2192 use model directly\n    model = pipeline.named_steps[\"model\"\
          ]\n    y_pred = model.predict(X_test.values)\n\n    # \u2500\u2500 Regression\
          \ metrics \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\n    rmse  = float(np.sqrt(mean_squared_error(y_test,\
          \ y_pred)))\n    mae   = float(mean_absolute_error(y_test, y_pred))\n  \
          \  r2    = float(r2_score(y_test, y_pred))\n    mape  = float(mean_absolute_percentage_error(y_test,\
          \ y_pred)) * 100\n    # Residuals\n    residuals = y_pred - y_test.values\n\
          \    mean_resid = float(residuals.mean())\n    std_resid  = float(residuals.std())\n\
          \n    # Price bucket accuracy (within \xB1$2000)\n    within_2k = float(np.mean(np.abs(residuals)\
          \ <= 2_000) * 100)\n\n    metrics = {\n        \"test_rmse\":          \
          \    rmse,\n        \"test_mae\":               mae,\n        \"test_r2\"\
          :                r2,\n        \"test_mape_pct\":          round(mape, 2),\n\
          \        \"test_mean_residual\":     round(mean_resid, 2),\n        \"test_std_residual\"\
          :      round(std_resid, 2),\n        \"test_within_2k_pct\":     round(within_2k,\
          \ 2),\n        \"rmse_threshold\":         rmse_threshold,\n        \"r2_threshold\"\
          :           r2_threshold,\n    }\n\n    print(\"\\n=== Evaluation metrics\
          \ ===\")\n    for k, v in metrics.items():\n        print(f\"  {k}: {v}\"\
          )\n        evaluation_metrics.log_metric(k, v)\n\n    # \u2500\u2500 Deployment\
          \ gate \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    passes_rmse\
          \ = rmse <= rmse_threshold\n    passes_r2   = r2   >= r2_threshold\n   \
          \ deploy_decision = \"deploy\" if (passes_rmse and passes_r2) else \"reject\"\
          \n\n    print(\"\\n=== Deployment gate ===\")\n    print(f\"  RMSE {rmse:.0f}\
          \ <= threshold {rmse_threshold:.0f}: {passes_rmse}\")\n    print(f\"  R\xB2\
          \   {r2:.3f} >= threshold {r2_threshold:.3f}: {passes_r2}\")\n    print(f\"\
          \  Decision: {deploy_decision.upper()}\")\n\n    evaluation_metrics.log_metric(\"\
          deploy_decision\", deploy_decision)\n\n    # \u2500\u2500 Log to Vertex\
          \ AI Experiment Run \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\n    # Unique suffix prevents AlreadyExists\
          \ 409 on component retries.\n    unique_run_name = f\"{experiment_run_name}-eval-{uuid.uuid4().hex[:6]}\"\
          \n    print(f\"Experiment run name: {unique_run_name}\")\n    with aip.start_run(unique_run_name):\n\
          \        aip.log_metrics({k: v for k, v in metrics.items() if isinstance(v,\
          \ (int, float))})\n        aip.log_params({\"deploy_decision\": deploy_decision})\n\
          \n    EvalOutputs = namedtuple(\"EvalOutputs\", [\"deploy_decision\", \"\
          test_rmse\", \"test_r2\"])\n    return EvalOutputs(\n        deploy_decision=deploy_decision,\n\
          \        test_rmse=round(rmse, 2),\n        test_r2=round(r2, 4),\n    )\n\
          \n"
        image: python:3.10-slim
