        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef model_training_op(\n    project_id: str,\n    region: str,\n\
          \    staging_bucket: str,\n    experiment_name: str,\n    experiment_run_name:\
          \ str,\n    preprocessed_train: Input[Dataset],\n    preprocessor_artifact:\
          \ Input[Model],\n    # Hyperparameters\n    n_estimators: int,\n    max_depth:\
          \ int,\n    learning_rate: float,\n    subsample: float,\n    colsample_bytree:\
          \ float,\n    min_child_weight: int,\n    # Outputs\n    trained_model:\
          \ Output[Model],\n    training_metrics: Output[Metrics],\n    feature_importance:\
          \ Output[Artifact],\n) -> None:\n    \"\"\"Train XGBoost, log to Vertex\
          \ AI Experiments, save full sklearn Pipeline.\"\"\"\n    import json\n \
          \   import time\n    import uuid\n    import joblib\n    import numpy as\
          \ np\n    import pandas as pd\n    from sklearn.pipeline import Pipeline\n\
          \    from xgboost import XGBRegressor\n    from sklearn.metrics import mean_squared_error,\
          \ r2_score, mean_absolute_error\n    import google.cloud.aiplatform as aip\n\
          \n    aip.init(\n        project=project_id,\n        location=region,\n\
          \        staging_bucket=staging_bucket,\n        experiment=experiment_name,\n\
          \    )\n\n    TARGET = \"price\"\n\n    print(\"=== Loading preprocessed\
          \ training data ===\")\n    train_df = pd.read_csv(preprocessed_train.path\
          \ + \".csv\")\n    X_train = train_df.drop(columns=[TARGET])\n    y_train\
          \ = train_df[TARGET]\n    print(f\"Training on {len(X_train):,} rows \xD7\
          \ {X_train.shape[1]} features\")\n\n    # Load fitted preprocessor metadata\
          \ for feature names\n    preprocessor_data = joblib.load(preprocessor_artifact.path\
          \ + \".pkl\")\n    meta = preprocessor_data[\"meta\"]\n\n    # \u2500\u2500\
          \ Start Vertex AI Experiment Run \u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    # Append\
          \ a short UUID so component retries never collide on the same context name.\n\
          \    unique_run_name = f\"{experiment_run_name}-{uuid.uuid4().hex[:6]}\"\
          \n    print(f\"Experiment run name: {unique_run_name}\")\n    with aip.start_run(unique_run_name):\n\
          \        params = {\n            \"n_estimators\":      n_estimators,\n\
          \            \"max_depth\":         max_depth,\n            \"learning_rate\"\
          :     learning_rate,\n            \"subsample\":         subsample,\n  \
          \          \"colsample_bytree\":  colsample_bytree,\n            \"min_child_weight\"\
          :  min_child_weight,\n        }\n        aip.log_params(params)\n\n    \
          \    print(f\"=== Training XGBoost with params: {params} ===\")\n      \
          \  t0 = time.time()\n\n        model = XGBRegressor(\n            n_estimators=n_estimators,\n\
          \            max_depth=max_depth,\n            learning_rate=learning_rate,\n\
          \            subsample=subsample,\n            colsample_bytree=colsample_bytree,\n\
          \            min_child_weight=min_child_weight,\n            objective=\"\
          reg:squarederror\",\n            random_state=42,\n            n_jobs=-1,\n\
          \            eval_metric=\"rmse\",\n        )\n\n        # Fit with early-stopping\
          \ eval set (last 10% of train as internal validation)\n        split = int(0.9\
          \ * len(X_train))\n        X_tr, X_val = X_train.iloc[:split], X_train.iloc[split:]\n\
          \        y_tr, y_val = y_train.iloc[:split], y_train.iloc[split:]\n\n  \
          \      model.fit(\n            X_tr, y_tr,\n            eval_set=[(X_val,\
          \ y_val)],\n            verbose=50,\n        )\n\n        elapsed = time.time()\
          \ - t0\n        print(f\"Training completed in {elapsed:.1f}s\")\n\n   \
          \     # \u2500\u2500 Training metrics \u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n        y_pred_train\
          \ = model.predict(X_train)\n        rmse_train = float(np.sqrt(mean_squared_error(y_train,\
          \ y_pred_train)))\n        mae_train  = float(mean_absolute_error(y_train,\
          \ y_pred_train))\n        r2_train   = float(r2_score(y_train, y_pred_train))\n\
          \n        metrics_dict = {\n            \"train_rmse\":         rmse_train,\n\
          \            \"train_mae\":          mae_train,\n            \"train_r2\"\
          :           r2_train,\n            \"training_time_secs\": round(elapsed,\
          \ 2),\n            \"best_iteration\":     int(model.best_iteration) if\
          \ hasattr(model, \"best_iteration\") else n_estimators,\n        }\n   \
          \     aip.log_metrics(metrics_dict)\n        print(\"Training metrics:\"\
          , metrics_dict)\n\n        # Log to KFP Metrics artifact\n        for k,\
          \ v in metrics_dict.items():\n            training_metrics.log_metric(k,\
          \ v)\n\n    # \u2500\u2500 Save full pipeline (preprocessor + model) \u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\n    # We bundle preprocessor + xgb so the artifact\
          \ is self-contained for serving\n    preprocessor = preprocessor_data[\"\
          preprocessor\"]\n    full_pipeline = Pipeline([\n        (\"preprocessor\"\
          , preprocessor),\n        (\"model\",        model),\n    ])\n\n    model_path\
          \ = trained_model.path + \".pkl\"\n    joblib.dump(full_pipeline, model_path)\n\
          \    print(f\"Full sklearn Pipeline saved \u2192 {model_path}\")\n\n   \
          \ # \u2500\u2500 Feature importance \u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n   \
          \ feature_names = meta[\"feature_names\"]\n    importance = dict(zip(feature_names,\
          \ model.feature_importances_.tolist()))\n    importance_sorted = dict(sorted(importance.items(),\
          \ key=lambda x: x[1], reverse=True))\n\n    with open(feature_importance.path\
          \ + \".json\", \"w\") as f:\n        json.dump(importance_sorted, f, indent=2)\n\
          \n    print(\"\\nTop-10 feature importances:\")\n    for feat, score in\
          \ list(importance_sorted.items())[:10]:\n        print(f\"  {feat}: {score:.4f}\"\
          )\n\n    print(\"=== Training complete ===\")\n\n"
        image: python:3.10-slim
        resources:
          cpuLimit: 8.0
          memoryLimit: 32.0
pipelineInfo:
  description: End-to-end MLOps training pipeline for used car price prediction. Ingests
    from BigQuery, preprocesses, trains XGBoost, evaluates, registers in Model Registry,
    and deploys to Staging + Production endpoints.
  name: used-car-training-pipeline
root:
  dag:
    outputs:
      artifacts:
        data-preprocessing-op-preprocessing_metrics:
          artifactSelectors:
          - outputArtifactKey: preprocessing_metrics
            producerSubtask: data-preprocessing-op
        model-evaluation-op-evaluation_metrics:
          artifactSelectors:
          - outputArtifactKey: evaluation_metrics
            producerSubtask: model-evaluation-op
        model-training-op-training_metrics:
          artifactSelectors:
          - outputArtifactKey: training_metrics
            producerSubtask: model-training-op
    tasks:
      condition-1:
        componentRef:
          name: comp-condition-1
        dependentTasks:
        - model-evaluation-op
        - model-training-op
        inputs:
          artifacts:
            pipelinechannel--model-training-op-trained_model:
              taskOutputArtifact:
                outputArtifactKey: trained_model
                producerTask: model-training-op
          parameters:
            pipelinechannel--experiment_name:
              componentInputParameter: experiment_name
            pipelinechannel--model-evaluation-op-deploy_decision:
              taskOutputParameter:
                outputParameterKey: deploy_decision
                producerTask: model-evaluation-op
            pipelinechannel--model-evaluation-op-test_r2:
              taskOutputParameter:
                outputParameterKey: test_r2
                producerTask: model-evaluation-op
            pipelinechannel--model-evaluation-op-test_rmse:
              taskOutputParameter:
                outputParameterKey: test_rmse
