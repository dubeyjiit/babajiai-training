# PIPELINE DEFINITION
# Name: used-car-training-pipeline
# Description: End-to-end MLOps training pipeline for used car price prediction. Ingests from BigQuery, preprocesses, trains XGBoost, evaluates, registers in Model Registry, and deploys to Staging + Production endpoints.
# Inputs:
#    bq_dataset: str [Default: 'used_car_mlops']
#    bq_test_table: str [Default: 'car_prices_test']
#    bq_train_table: str [Default: 'car_prices_train']
#    colsample_bytree: float [Default: 0.8]
#    experiment_name: str [Default: 'used-car-price-prediction']
#    learning_rate: float [Default: 0.05]
#    max_depth: int [Default: 6.0]
#    min_child_weight: int [Default: 3.0]
#    model_name: str [Default: 'used-car-price-xgb']
#    n_estimators: int [Default: 300.0]
#    pipeline_run_id: str [Default: 'manual']
#    prod_max_replicas: int [Default: 5.0]
#    prod_min_replicas: int [Default: 2.0]
#    project_id: str
#    promote_to_production: bool [Default: True]
#    r2_threshold: float [Default: 0.8]
#    region: str [Default: 'us-central1']
#    rmse_threshold: float [Default: 4500.0]
#    serving_container_image: str [Default: 'us-docker.pkg.dev/vertex-ai/prediction/sklearn-cpu.1-3:latest']
#    serving_machine_type: str [Default: 'n1-standard-4']
#    staging_bucket: str [Default: 'gs://<YOUR_PROJECT>-mlops-artifacts']
#    staging_max_replicas: int [Default: 2.0]
#    staging_min_replicas: int [Default: 1.0]
#    subsample: float [Default: 0.8]
#    vertex_dataset_name: str [Default: 'used-car-prices-dataset']
# Outputs:
#    data-preprocessing-op-preprocessing_metrics: system.Metrics
#    model-evaluation-op-evaluation_metrics: system.Metrics
#    model-training-op-training_metrics: system.Metrics
components:
  comp-condition-1:
    dag:
      tasks:
        condition-2:
          componentRef:
            name: comp-condition-2
          dependentTasks:
          - model-registry-op
          - model-serving-op
          inputs:
            artifacts:
              pipelinechannel--model-registry-op-registered_model_info:
                taskOutputArtifact:
                  outputArtifactKey: registered_model_info
                  producerTask: model-registry-op
            parameters:
              pipelinechannel--model-evaluation-op-deploy_decision:
                componentInputParameter: pipelinechannel--model-evaluation-op-deploy_decision
              pipelinechannel--model-registry-op-model_resource_name:
                taskOutputParameter:
                  outputParameterKey: model_resource_name
                  producerTask: model-registry-op
              pipelinechannel--prod_max_replicas:
                componentInputParameter: pipelinechannel--prod_max_replicas
              pipelinechannel--prod_min_replicas:
                componentInputParameter: pipelinechannel--prod_min_replicas
              pipelinechannel--project_id:
                componentInputParameter: pipelinechannel--project_id
              pipelinechannel--promote_to_production:
                componentInputParameter: pipelinechannel--promote_to_production
              pipelinechannel--region:
                componentInputParameter: pipelinechannel--region
              pipelinechannel--serving_machine_type:
                componentInputParameter: pipelinechannel--serving_machine_type
              pipelinechannel--staging_bucket:
                componentInputParameter: pipelinechannel--staging_bucket
          taskInfo:
            name: Promote to Production
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--promote_to_production']
              == true
        model-registry-op:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-model-registry-op
          inputs:
            artifacts:
              trained_model:
                componentInputArtifact: pipelinechannel--model-training-op-trained_model
            parameters:
              experiment_name:
                componentInputParameter: pipelinechannel--experiment_name
              experiment_run_name:
                runtimeValue:
                  constant: run-{{$.inputs.parameters['pipelinechannel--pipeline_run_id']}}
              model_name:
                componentInputParameter: pipelinechannel--model_name
              pipeline_run_id:
                componentInputParameter: pipelinechannel--pipeline_run_id
              pipelinechannel--pipeline_run_id:
                componentInputParameter: pipelinechannel--pipeline_run_id
              project_id:
                componentInputParameter: pipelinechannel--project_id
              region:
                componentInputParameter: pipelinechannel--region
              serving_container_image:
                componentInputParameter: pipelinechannel--serving_container_image
              staging_bucket:
                componentInputParameter: pipelinechannel--staging_bucket
              test_r2:
                componentInputParameter: pipelinechannel--model-evaluation-op-test_r2
              test_rmse:
                componentInputParameter: pipelinechannel--model-evaluation-op-test_rmse
          taskInfo:
            name: "5 \xB7 Model Registry (versioned)"
        model-serving-op:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-model-serving-op
          dependentTasks:
          - model-registry-op
          inputs:
            artifacts:
              registered_model_info:
                taskOutputArtifact:
                  outputArtifactKey: registered_model_info
                  producerTask: model-registry-op
            parameters:
              environment:
                runtimeValue:
                  constant: staging
              machine_type:
                componentInputParameter: pipelinechannel--serving_machine_type
              max_replicas:
                componentInputParameter: pipelinechannel--staging_max_replicas
              min_replicas:
                componentInputParameter: pipelinechannel--staging_min_replicas
              model_resource_name:
                taskOutputParameter:
                  outputParameterKey: model_resource_name
                  producerTask: model-registry-op
              project_id:
                componentInputParameter: pipelinechannel--project_id
              region:
                componentInputParameter: pipelinechannel--region
              staging_bucket:
                componentInputParameter: pipelinechannel--staging_bucket
          taskInfo:
            name: "6 \xB7 Deploy \u2192 Staging Endpoint"
    inputDefinitions:
      artifacts:
        pipelinechannel--model-training-op-trained_model:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--experiment_name:
          parameterType: STRING
        pipelinechannel--model-evaluation-op-deploy_decision:
          parameterType: STRING
        pipelinechannel--model-evaluation-op-test_r2:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--model-evaluation-op-test_rmse:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--model_name:
          parameterType: STRING
        pipelinechannel--pipeline_run_id:
          parameterType: STRING
        pipelinechannel--prod_max_replicas:
          parameterType: NUMBER_INTEGER
        pipelinechannel--prod_min_replicas:
          parameterType: NUMBER_INTEGER
        pipelinechannel--project_id:
          parameterType: STRING
        pipelinechannel--promote_to_production:
          parameterType: BOOLEAN
        pipelinechannel--region:
          parameterType: STRING
        pipelinechannel--serving_container_image:
          parameterType: STRING
        pipelinechannel--serving_machine_type:
          parameterType: STRING
        pipelinechannel--staging_bucket:
          parameterType: STRING
        pipelinechannel--staging_max_replicas:
          parameterType: NUMBER_INTEGER
        pipelinechannel--staging_min_replicas:
          parameterType: NUMBER_INTEGER
