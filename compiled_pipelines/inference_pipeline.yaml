          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess_inference_op(\n    project_id: str,\n    staging_bucket:\
          \ str,\n    preprocessor_gcs_path: str,           # e.g. gs://bucket/models/latest/preprocessor.pkl\n\
          \    new_data: Input[Dataset],\n    preprocessed_inference: Output[Dataset],\n\
          ) -> None:\n    \"\"\"\n    Apply feature engineering and column selection\
          \ ONLY.\n\n    The saved artifact is a full sklearn Pipeline(preprocessor\
          \ + model).\n    When we call pipeline.predict(X), the Pipeline applies\
          \ ColumnTransformer\n    internally. So this component must output RAW+ENGINEERED\
          \ features\n    (before scaling/encoding), not already-transformed ones.\n\
          \n    Feeding pre-scaled features into the Pipeline would double-preprocess\n\
          \    and produce garbage predictions.\n    \"\"\"\n    import io\n    import\
          \ joblib\n    import pandas as pd\n    from google.cloud import storage\n\
          \n    print(\"=== Feature engineering for inference ===\")\n    df = pd.read_csv(new_data.path\
          \ + \".csv\")\n    print(f\"Input rows: {len(df)}\")\n\n    # Download preprocessor\
          \ metadata to get the exact column order used at training time\n    bucket_name\
          \ = preprocessor_gcs_path.replace(\"gs://\", \"\").split(\"/\")[0]\n   \
          \ blob_path   = \"/\".join(preprocessor_gcs_path.replace(\"gs://\", \"\"\
          ).split(\"/\")[1:])\n    client = storage.Client(project=project_id)\n \
          \   blob = client.bucket(bucket_name).blob(blob_path)\n    meta = joblib.load(io.BytesIO(blob.download_as_bytes()))[\"\
          meta\"]\n\n    NUMERIC_FEATURES     = meta[\"numeric_features\"]\n    CATEGORICAL_FEATURES\
          \ = meta[\"categorical_features\"]\n\n    # Feature engineering \u2014 identical\
          \ to training preprocessing\n    df[\"car_age\"]          = 2024 - df[\"\
          year\"]\n    df[\"mileage_per_year\"] = df[\"mileage\"] / (df[\"car_age\"\
          ].replace(0, 1))\n    df[\"hp_per_liter\"]     = df[\"horsepower\"] / df[\"\
          engine_size\"]\n\n    # Select columns in the exact order the Pipeline was\
          \ fitted on\n    # Do NOT call preprocessor.transform() here \u2014 the\
          \ full Pipeline does that internally\n    X = df[NUMERIC_FEATURES + CATEGORICAL_FEATURES]\n\
          \n    out_df = X.copy()\n    if \"row_id\" in df.columns:\n        out_df.insert(0,\
          \ \"row_id\", df[\"row_id\"].values)\n\n    out_df.to_csv(preprocessed_inference.path\
          \ + \".csv\", index=False)\n    print(f\"Feature-engineered rows saved:\
          \ {len(out_df)}\")\n    print(f\"Columns (raw+engineered, pre-transform):\
          \ {list(X.columns)}\")\n\n"
        image: python:3.10-slim
