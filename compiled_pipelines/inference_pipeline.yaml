pipelineInfo:
  description: Inference pipeline for used car price prediction. Triggered by new
    rows in BigQuery. Routes to online or batch prediction based on row count.
  name: used-car-inference-pipeline
root:
  dag:
    outputs:
      artifacts:
        batch-prediction-op-prediction_metrics:
          artifactSelectors:
          - outputArtifactKey: batch-prediction-op-prediction_metrics
            producerSubtask: condition-1
        check-new-data-op-data_check:
          artifactSelectors:
          - outputArtifactKey: data_check
            producerSubtask: check-new-data-op
        online-prediction-op-prediction_metrics:
          artifactSelectors:
          - outputArtifactKey: online-prediction-op-prediction_metrics
            producerSubtask: condition-1
        store-predictions-op-2-store_metrics:
          artifactSelectors:
          - outputArtifactKey: store-predictions-op-2-store_metrics
            producerSubtask: condition-1
        store-predictions-op-store_metrics:
          artifactSelectors:
          - outputArtifactKey: store-predictions-op-store_metrics
            producerSubtask: condition-1
    tasks:
      check-new-data-op:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-check-new-data-op
        inputs:
          parameters:
            batch_threshold:
              componentInputParameter: batch_threshold
            bq_dataset:
              componentInputParameter: bq_dataset
            inference_table:
              componentInputParameter: inference_table
            processed_table:
              componentInputParameter: processed_table
            project_id:
              componentInputParameter: project_id
        taskInfo:
          name: "1 \xB7 Check New BQ Data"
      condition-1:
        componentRef:
          name: comp-condition-1
        dependentTasks:
        - check-new-data-op
        inputs:
          artifacts:
            pipelinechannel--check-new-data-op-new_data:
              taskOutputArtifact:
                outputArtifactKey: new_data
                producerTask: check-new-data-op
          parameters:
            pipelinechannel--batch_machine_type:
              componentInputParameter: batch_machine_type
            pipelinechannel--batch_max_replicas:
              componentInputParameter: batch_max_replicas
            pipelinechannel--batch_starting_replicas:
              componentInputParameter: batch_starting_replicas
            pipelinechannel--bq_dataset:
              componentInputParameter: bq_dataset
            pipelinechannel--check-new-data-op-inference_mode:
              taskOutputParameter:
                outputParameterKey: inference_mode
                producerTask: check-new-data-op
            pipelinechannel--check-new-data-op-row_count:
              taskOutputParameter:
                outputParameterKey: row_count
                producerTask: check-new-data-op
            pipelinechannel--endpoint_id:
              componentInputParameter: endpoint_id
            pipelinechannel--model_resource_name:
              componentInputParameter: model_resource_name
            pipelinechannel--pipeline_run_id:
              componentInputParameter: pipeline_run_id
            pipelinechannel--predictions_table:
              componentInputParameter: predictions_table
            pipelinechannel--preprocessor_gcs_path:
              componentInputParameter: preprocessor_gcs_path
            pipelinechannel--processed_table:
              componentInputParameter: processed_table
            pipelinechannel--project_id:
              componentInputParameter: project_id
            pipelinechannel--region:
              componentInputParameter: region
            pipelinechannel--staging_bucket:
              componentInputParameter: staging_bucket
        taskInfo:
          name: Has new rows
        triggerPolicy:
          condition: int(inputs.parameter_values['pipelinechannel--check-new-data-op-row_count'])
            > 0
  inputDefinitions:
    parameters:
      batch_machine_type:
        defaultValue: n1-standard-4
        isOptional: true
        parameterType: STRING
      batch_max_replicas:
        defaultValue: 10.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      batch_starting_replicas:
        defaultValue: 2.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      batch_threshold:
        defaultValue: 100.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      bq_dataset:
        defaultValue: used_car_mlops
        isOptional: true
        parameterType: STRING
      endpoint_id:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      inference_table:
        defaultValue: car_prices_inference
        isOptional: true
        parameterType: STRING
      model_resource_name:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      pipeline_run_id:
        defaultValue: manual
        isOptional: true
        parameterType: STRING
      predictions_table:
        defaultValue: car_predictions
        isOptional: true
        parameterType: STRING
      preprocessor_gcs_path:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      processed_table:
        defaultValue: car_prices_inference_processed
        isOptional: true
        parameterType: STRING
      project_id:
        parameterType: STRING
