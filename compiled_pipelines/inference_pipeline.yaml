            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        store-predictions-op-2-store_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        store-predictions-op-store_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
  comp-condition-2:
    dag:
      outputs:
        artifacts:
          online-prediction-op-prediction_metrics:
            artifactSelectors:
            - outputArtifactKey: prediction_metrics
              producerSubtask: online-prediction-op
          store-predictions-op-store_metrics:
            artifactSelectors:
            - outputArtifactKey: store_metrics
              producerSubtask: store-predictions-op
      tasks:
        online-prediction-op:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-online-prediction-op
          inputs:
            artifacts:
              preprocessed_inference:
                componentInputArtifact: pipelinechannel--preprocess-inference-op-preprocessed_inference
            parameters:
