            parameters:
              batch_machine_type:
                componentInputParameter: pipelinechannel--batch_machine_type
              batch_max_replicas:
                componentInputParameter: pipelinechannel--batch_max_replicas
              batch_starting_replicas:
                componentInputParameter: pipelinechannel--batch_starting_replicas
              model_resource_name:
                componentInputParameter: pipelinechannel--model_resource_name
              project_id:
                componentInputParameter: pipelinechannel--project_id
              region:
                componentInputParameter: pipelinechannel--region
              staging_bucket:
                componentInputParameter: pipelinechannel--staging_bucket
          taskInfo:
            name: "3b \xB7 Batch Prediction Job (Vertex AI Batch Inference)"
        store-predictions-op-2:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-store-predictions-op-2
          dependentTasks:
          - batch-prediction-op
          inputs:
            artifacts:
              predictions:
                taskOutputArtifact:
                  outputArtifactKey: predictions
                  producerTask: batch-prediction-op
            parameters:
              bq_dataset:
                componentInputParameter: pipelinechannel--bq_dataset
              model_resource_name:
                componentInputParameter: pipelinechannel--model_resource_name
              pipeline_run_id:
                componentInputParameter: pipelinechannel--pipeline_run_id
              predictions_table:
                componentInputParameter: pipelinechannel--predictions_table
              processed_table:
                componentInputParameter: pipelinechannel--processed_table
              project_id:
                componentInputParameter: pipelinechannel--project_id
          taskInfo:
            name: "4b \xB7 Store Batch Predictions \u2192 BQ"
    inputDefinitions:
      artifacts:
        pipelinechannel--preprocess-inference-op-preprocessed_inference:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--batch_machine_type:
          parameterType: STRING
        pipelinechannel--batch_max_replicas:
          parameterType: NUMBER_INTEGER
        pipelinechannel--batch_starting_replicas:
