          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef check_new_data_op(\n    project_id: str,\n    bq_dataset: str,\n\
          \    inference_table: str,\n    processed_table: str,\n    batch_threshold:\
          \ int,\n    new_data: Output[Dataset],\n    data_check: Output[Metrics],\n\
          ) -> NamedTuple(\"DataCheckOutputs\", [(\"row_count\", int), (\"inference_mode\"\
          , str)]):\n    \"\"\"Query BQ for rows not yet in the processed-tracking\
          \ table.\"\"\"\n    from google.cloud import bigquery\n    from collections\
          \ import namedtuple\n\n    client = bigquery.Client(project=project_id)\n\
          \n    query = f\"\"\"\n        SELECT inf.*\n        FROM `{project_id}.{bq_dataset}.{inference_table}`\
          \ inf\n        LEFT JOIN `{project_id}.{bq_dataset}.{processed_table}` proc\n\
          \          USING (row_id)\n        WHERE proc.row_id IS NULL\n        ORDER\
          \ BY inf.row_id\n    \"\"\"\n    print(f\"=== Checking for new inference\
          \ rows ===\\n{query}\")\n\n    df = client.query(query).to_dataframe()\n\
          \    row_count = len(df)\n    print(f\"Found {row_count} unprocessed rows\"\
          )\n\n    df.to_csv(new_data.path + \".csv\", index=False)\n\n    inference_mode\
          \ = \"batch\" if row_count >= batch_threshold else \"online\"\n    print(f\"\
          Inference mode: {inference_mode} (threshold={batch_threshold})\")\n\n  \
          \  data_check.log_metric(\"new_row_count\", row_count)\n    data_check.log_metric(\"\
          batch_threshold\", batch_threshold)\n    data_check.log_metric(\"inference_mode_is_batch\"\
          , int(inference_mode == \"batch\"))\n\n    DataCheckOutputs = namedtuple(\"\
          DataCheckOutputs\", [\"row_count\", \"inference_mode\"])\n    return DataCheckOutputs(row_count=row_count,\
          \ inference_mode=inference_mode)\n\n"
