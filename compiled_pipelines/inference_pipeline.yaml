deploymentSpec:
  executors:
    exec-batch-prediction-op:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - batch_prediction_op
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.7.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"'  &&\
          \  python3 -m pip install --quiet --no-warn-script-location 'scikit-learn==1.4.2'\
          \ 'xgboost==2.0.3' 'google-cloud-aiplatform==1.60.0' 'google-cloud-storage==2.17.0'\
          \ 'pandas==2.2.2' 'numpy==1.26.4' 'joblib==1.4.2' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef batch_prediction_op(\n    project_id: str,\n    region: str,\n\
          \    staging_bucket: str,\n    model_resource_name: str,\n    batch_machine_type:\
          \ str,           # kept for pipeline signature compatibility\n    batch_starting_replicas:\
          \ int,      # kept for pipeline signature compatibility\n    batch_max_replicas:\
          \ int,           # kept for pipeline signature compatibility\n    preprocessed_inference:\
          \ Input[Dataset],\n    predictions: Output[Dataset],\n    prediction_metrics:\
          \ Output[Metrics],\n) -> None:\n    \"\"\"\n    Score inference rows locally\
          \ by loading the model artifact from GCS.\n\n    Why local scoring instead\
          \ of Vertex AI Batch Prediction service:\n      The sklearn-cpu.1-3 pre-built\
          \ serving container is incompatible with\n      a pickled sklearn Pipeline\
          \ that contains XGBoost 2.0.3 \u2014 it raises\n      \"'numpy.ndarray'\
          \ object has no attribute 'predict'\" on every request.\n      Loading the\
          \ model directly with the same sklearn==1.4.2 / xgboost==2.0.3\n      versions\
          \ used during training is reliable and avoids VM spin-up latency.\n    \"\
          \"\"\n    import io\n    import joblib\n    import numpy as np\n    import\
          \ pandas as pd\n    import google.cloud.aiplatform as aip\n    from google.cloud\
          \ import storage\n\n    aip.init(project=project_id, location=region)\n\n\
          \    # \u2500\u2500 Load preprocessed features \u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\n    df = pd.read_csv(preprocessed_inference.path\
          \ + \".csv\")\n    row_ids    = df[\"row_id\"].tolist() if \"row_id\" in\
          \ df.columns else list(range(len(df)))\n    feature_df = df.drop(columns=[\"\
          row_id\"], errors=\"ignore\")\n    print(f\"Scoring {len(feature_df)} rows\
          \ \xB7 {feature_df.shape[1]} features\")\n\n    # \u2500\u2500 Fetch model\
          \ artifact URI from Vertex AI Model Registry \u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n   \
          \ model_obj    = aip.Model(model_resource_name)\n    artifact_uri = model_obj.uri\
          \                   # gs://.../models/{run-id}\n    gcs_pkl      = artifact_uri.rstrip(\"\
          /\") + \"/model.pkl\"\n    print(f\"Loading model from: {gcs_pkl}\")\n\n\
          \    # \u2500\u2500 Download and deserialise full sklearn Pipeline \u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \n    gcs_client  = storage.Client(project=project_id)\n    bucket_name\
          \ = gcs_pkl.replace(\"gs://\", \"\").split(\"/\")[0]\n    blob_path   =\
          \ \"/\".join(gcs_pkl.replace(\"gs://\", \"\").split(\"/\")[1:])\n    pipeline\
          \    = joblib.load(io.BytesIO(\n        gcs_client.bucket(bucket_name).blob(blob_path).download_as_bytes()\n\
          \    ))\n    print(f\"Model type: {type(pipeline)}\")\n\n    # \u2500\u2500\
          \ Local prediction \u2014 Pipeline handles ColumnTransformer internally\
          \ \u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    # Pass DataFrame (not\
          \ .values) so ColumnTransformer can index by column name\n    y_pred = pipeline.predict(feature_df)\n\
          \    print(f\"Predictions: min={y_pred.min():.2f}  max={y_pred.max():.2f}\
          \  mean={y_pred.mean():.2f}\")\n\n    # \u2500\u2500 Save results \u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n    pred_df\
          \ = pd.DataFrame({\n        \"row_id\":          row_ids,\n        \"predicted_price\"\
          : y_pred.round(2).tolist(),\n    })\n    pred_df.to_csv(predictions.path\
          \ + \".csv\", index=False)\n\n    prediction_metrics.log_metric(\"rows_predicted\"\
          ,        len(pred_df))\n    prediction_metrics.log_metric(\"mean_predicted_price\"\
          ,  float(np.mean(y_pred)))\n    prediction_metrics.log_metric(\"min_predicted_price\"\
          ,   float(np.min(y_pred)))\n    prediction_metrics.log_metric(\"max_predicted_price\"\
          ,   float(np.max(y_pred)))\n    print(f\"Local batch scoring complete: {len(pred_df)}\
          \ rows\")\n\n"
        image: python:3.10-slim
