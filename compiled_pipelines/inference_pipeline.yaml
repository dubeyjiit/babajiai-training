              processed_table:
                componentInputParameter: pipelinechannel--processed_table
              project_id:
                componentInputParameter: pipelinechannel--project_id
          taskInfo:
            name: "4a \xB7 Store Online Predictions \u2192 BQ"
    inputDefinitions:
      artifacts:
