        pipelinechannel--region:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        online-prediction-op-prediction_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        store-predictions-op-store_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
  comp-condition-3:
    dag:
      outputs:
        artifacts:
          batch-prediction-op-prediction_metrics:
            artifactSelectors:
            - outputArtifactKey: prediction_metrics
