# PIPELINE DEFINITION
# Name: used-car-inference-pipeline
# Description: Inference pipeline for used car price prediction. Triggered by new rows in BigQuery. Routes to online or batch prediction based on row count.
# Inputs:
#    batch_machine_type: str [Default: 'n1-standard-4']
#    batch_max_replicas: int [Default: 10.0]
#    batch_starting_replicas: int [Default: 2.0]
#    batch_threshold: int [Default: 100.0]
#    bq_dataset: str [Default: 'used_car_mlops']
#    endpoint_id: str [Default: '']
#    inference_table: str [Default: 'car_prices_inference']
#    model_resource_name: str [Default: '']
#    pipeline_run_id: str [Default: 'manual']
#    predictions_table: str [Default: 'car_predictions']
#    preprocessor_gcs_path: str [Default: '']
#    processed_table: str [Default: 'car_prices_inference_processed']
#    project_id: str
#    region: str [Default: 'us-central1']
#    staging_bucket: str [Default: 'gs://<YOUR_PROJECT>-mlops-artifacts']
# Outputs:
#    batch-prediction-op-prediction_metrics: system.Metrics
#    check-new-data-op-data_check: system.Metrics
#    online-prediction-op-prediction_metrics: system.Metrics
#    store-predictions-op-2-store_metrics: system.Metrics
#    store-predictions-op-store_metrics: system.Metrics
components:
  comp-batch-prediction-op:
    executorLabel: exec-batch-prediction-op
    inputDefinitions:
      artifacts:
        preprocessed_inference:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        batch_machine_type:
          parameterType: STRING
        batch_max_replicas:
          parameterType: NUMBER_INTEGER
        batch_starting_replicas:
          parameterType: NUMBER_INTEGER
        model_resource_name:
          parameterType: STRING
        project_id:
          parameterType: STRING
        region:
          parameterType: STRING
        staging_bucket:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        prediction_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        predictions:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-check-new-data-op:
    executorLabel: exec-check-new-data-op
    inputDefinitions:
      parameters:
        batch_threshold:
          parameterType: NUMBER_INTEGER
        bq_dataset:
          parameterType: STRING
        inference_table:
          parameterType: STRING
        processed_table:
          parameterType: STRING
        project_id:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        data_check:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        new_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        inference_mode:
          parameterType: STRING
        row_count:
          parameterType: NUMBER_INTEGER
  comp-condition-1:
    dag:
      outputs:
        artifacts:
          batch-prediction-op-prediction_metrics:
            artifactSelectors:
            - outputArtifactKey: batch-prediction-op-prediction_metrics
              producerSubtask: condition-3
          online-prediction-op-prediction_metrics:
            artifactSelectors:
            - outputArtifactKey: online-prediction-op-prediction_metrics
              producerSubtask: condition-2
          store-predictions-op-2-store_metrics:
            artifactSelectors:
            - outputArtifactKey: store-predictions-op-2-store_metrics
              producerSubtask: condition-3
          store-predictions-op-store_metrics:
            artifactSelectors:
            - outputArtifactKey: store-predictions-op-store_metrics
              producerSubtask: condition-2
      tasks:
        condition-2:
          componentRef:
            name: comp-condition-2
          dependentTasks:
          - preprocess-inference-op
          inputs:
            artifacts:
              pipelinechannel--preprocess-inference-op-preprocessed_inference:
                taskOutputArtifact:
                  outputArtifactKey: preprocessed_inference
                  producerTask: preprocess-inference-op
            parameters:
              pipelinechannel--bq_dataset:
                componentInputParameter: pipelinechannel--bq_dataset
              pipelinechannel--check-new-data-op-inference_mode:
                componentInputParameter: pipelinechannel--check-new-data-op-inference_mode
              pipelinechannel--check-new-data-op-row_count:
                componentInputParameter: pipelinechannel--check-new-data-op-row_count
              pipelinechannel--endpoint_id:
                componentInputParameter: pipelinechannel--endpoint_id
              pipelinechannel--model_resource_name:
                componentInputParameter: pipelinechannel--model_resource_name
              pipelinechannel--pipeline_run_id:
                componentInputParameter: pipelinechannel--pipeline_run_id
              pipelinechannel--predictions_table:
                componentInputParameter: pipelinechannel--predictions_table
              pipelinechannel--processed_table:
                componentInputParameter: pipelinechannel--processed_table
              pipelinechannel--project_id:
                componentInputParameter: pipelinechannel--project_id
              pipelinechannel--region:
                componentInputParameter: pipelinechannel--region
          taskInfo:
            name: Online prediction
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--check-new-data-op-inference_mode']
              == 'online'
        condition-3:
          componentRef:
            name: comp-condition-3
          dependentTasks:
          - preprocess-inference-op
          inputs:
            artifacts:
              pipelinechannel--preprocess-inference-op-preprocessed_inference:
                taskOutputArtifact:
                  outputArtifactKey: preprocessed_inference
                  producerTask: preprocess-inference-op
            parameters:
              pipelinechannel--batch_machine_type:
                componentInputParameter: pipelinechannel--batch_machine_type
              pipelinechannel--batch_max_replicas:
                componentInputParameter: pipelinechannel--batch_max_replicas
              pipelinechannel--batch_starting_replicas:
                componentInputParameter: pipelinechannel--batch_starting_replicas
              pipelinechannel--bq_dataset:
                componentInputParameter: pipelinechannel--bq_dataset
              pipelinechannel--check-new-data-op-inference_mode:
                componentInputParameter: pipelinechannel--check-new-data-op-inference_mode
              pipelinechannel--check-new-data-op-row_count:
                componentInputParameter: pipelinechannel--check-new-data-op-row_count
              pipelinechannel--model_resource_name:
                componentInputParameter: pipelinechannel--model_resource_name
              pipelinechannel--pipeline_run_id:
                componentInputParameter: pipelinechannel--pipeline_run_id
              pipelinechannel--predictions_table:
                componentInputParameter: pipelinechannel--predictions_table
              pipelinechannel--processed_table:
                componentInputParameter: pipelinechannel--processed_table
              pipelinechannel--project_id:
                componentInputParameter: pipelinechannel--project_id
              pipelinechannel--region:
                componentInputParameter: pipelinechannel--region
              pipelinechannel--staging_bucket:
                componentInputParameter: pipelinechannel--staging_bucket
          taskInfo:
            name: Batch prediction
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--check-new-data-op-inference_mode']
              == 'batch'
        preprocess-inference-op:
          cachingOptions:
            enableCache: true
          componentRef:
            name: comp-preprocess-inference-op
          inputs:
            artifacts:
              new_data:
                componentInputArtifact: pipelinechannel--check-new-data-op-new_data
            parameters:
              preprocessor_gcs_path:
                componentInputParameter: pipelinechannel--preprocessor_gcs_path
              project_id:
                componentInputParameter: pipelinechannel--project_id
              staging_bucket:
                componentInputParameter: pipelinechannel--staging_bucket
          taskInfo:
            name: "2 \xB7 Preprocess Inference Data"
    inputDefinitions:
      artifacts:
        pipelinechannel--check-new-data-op-new_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--batch_machine_type:
          parameterType: STRING
        pipelinechannel--batch_max_replicas:
          parameterType: NUMBER_INTEGER
        pipelinechannel--batch_starting_replicas:
          parameterType: NUMBER_INTEGER
        pipelinechannel--bq_dataset:
          parameterType: STRING
        pipelinechannel--check-new-data-op-inference_mode:
          parameterType: STRING
        pipelinechannel--check-new-data-op-row_count:
          parameterType: NUMBER_INTEGER
        pipelinechannel--endpoint_id:
