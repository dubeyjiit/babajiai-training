          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef store_predictions_op(\n    project_id: str,\n    bq_dataset:\
          \ str,\n    predictions_table: str,\n    processed_table: str,\n    model_resource_name:\
          \ str,\n    pipeline_run_id: str,\n    predictions: Input[Dataset],\n  \
          \  store_metrics: Output[Metrics],\n) -> None:\n    \"\"\"Write predictions\
          \ to BQ and mark source rows as processed.\"\"\"\n    import pandas as pd\n\
          \    from google.cloud import bigquery\n\n    client = bigquery.Client(project=project_id)\n\
          \    pred_df = pd.read_csv(predictions.path + \".csv\")\n\n    # Use pd.Timestamp\
          \ so pyarrow can convert it to TIMESTAMP natively.\n    # datetime.isoformat()\
          \ returns a plain string which pyarrow cannot cast.\n    now_ts = pd.Timestamp.utcnow()\n\
          \    pred_df[\"model_version\"]   = model_resource_name.split(\"/models/\"\
          )[-1]\n    pred_df[\"pipeline_run_id\"] = pipeline_run_id\n    pred_df[\"\
          prediction_ts\"]   = now_ts\n\n    # Append predictions\n    table_ref =\
          \ f\"{project_id}.{bq_dataset}.{predictions_table}\"\n    job_config = bigquery.LoadJobConfig(\n\
          \        write_disposition=\"WRITE_APPEND\",\n        schema=[\n       \
          \     bigquery.SchemaField(\"row_id\",          \"STRING\"),\n         \
          \   bigquery.SchemaField(\"predicted_price\",  \"FLOAT64\"),\n         \
          \   bigquery.SchemaField(\"model_version\",    \"STRING\"),\n          \
          \  bigquery.SchemaField(\"pipeline_run_id\",  \"STRING\"),\n           \
          \ bigquery.SchemaField(\"prediction_ts\",    \"TIMESTAMP\"),\n        ],\n\
          \    )\n    job = client.load_table_from_dataframe(\n        pred_df[[\"\
          row_id\", \"predicted_price\", \"model_version\", \"pipeline_run_id\", \"\
          prediction_ts\"]],\n        table_ref,\n        job_config=job_config,\n\
          \    )\n    job.result()\n    print(f\"Wrote {len(pred_df)} predictions\
          \ \u2192 {table_ref}\")\n\n    # Mark rows as processed (prevents re-processing\
          \ on next run)\n    processed_ref = f\"{project_id}.{bq_dataset}.{processed_table}\"\
          \n    proc_df = pd.DataFrame({\n        \"row_id\":       pred_df[\"row_id\"\
          ],\n        \"processed_ts\": now_ts,\n    })\n    proc_job_config = bigquery.LoadJobConfig(\n\
          \        write_disposition=\"WRITE_APPEND\",\n        schema=[\n       \
          \     bigquery.SchemaField(\"row_id\",        \"STRING\"),\n           \
          \ bigquery.SchemaField(\"processed_ts\",  \"TIMESTAMP\"),\n        ],\n\
          \    )\n    proc_job = client.load_table_from_dataframe(proc_df, processed_ref,\
          \ job_config=proc_job_config)\n    proc_job.result()\n    print(f\"Marked\
          \ {len(proc_df)} rows as processed \u2192 {processed_ref}\")\n\n    store_metrics.log_metric(\"\
          predictions_stored\", len(pred_df))\n    store_metrics.log_metric(\"prediction_table\"\
          , table_ref)\n\n"
