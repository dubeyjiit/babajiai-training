          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef online_prediction_op(\n    project_id: str,\n    region: str,\n\
          \    endpoint_id: str,\n    preprocessed_inference: Input[Dataset],\n  \
          \  predictions: Output[Dataset],\n    prediction_metrics: Output[Metrics],\n\
          ) -> None:\n    \"\"\"\n    Send rows to the Vertex AI online endpoint in\
          \ mini-batches.\n\n    The input CSV contains RAW+ENGINEERED features (not\
          \ yet scaled/encoded).\n    The endpoint serves the full sklearn Pipeline\
          \ (preprocessor + model),\n    so it handles ColumnTransformer internally\
          \ \u2014 no pre-scaling needed here.\n    \"\"\"\n    import pandas as pd\n\
          \    import google.cloud.aiplatform as aip\n\n    aip.init(project=project_id,\
          \ location=region)\n\n    df = pd.read_csv(preprocessed_inference.path +\
          \ \".csv\")\n    row_ids = df[\"row_id\"].tolist() if \"row_id\" in df.columns\
          \ else [str(i) for i in range(len(df))]\n    # Drop row_id \u2014 endpoint\
          \ expects only feature columns\n    feature_df = df.drop(columns=[\"row_id\"\
          ], errors=\"ignore\")\n\n    endpoint = aip.Endpoint(endpoint_name=endpoint_id)\n\
          \n    BATCH_SIZE = 50   # Vertex AI online prediction: max instances per\
          \ request\n    all_preds = []\n    for start in range(0, len(feature_df),\
          \ BATCH_SIZE):\n        batch = feature_df.iloc[start:start + BATCH_SIZE]\n\
          \        instances = batch.values.tolist()   # list of feature arrays (raw+engineered)\n\
          \        response = endpoint.predict(instances=instances)\n        all_preds.extend(response.predictions)\n\
          \n    pred_df = pd.DataFrame({\"row_id\": row_ids, \"predicted_price\":\
          \ all_preds})\n    pred_df[\"predicted_price\"] = pred_df[\"predicted_price\"\
          ].round(2)\n    pred_df.to_csv(predictions.path + \".csv\", index=False)\n\
          \n    prediction_metrics.log_metric(\"rows_predicted\", len(pred_df))\n\
          \    prediction_metrics.log_metric(\"mean_predicted_price\", float(pd.Series(all_preds).mean()))\n\
          \    print(f\"Online predictions complete: {len(pred_df)} rows\")\n\n"
